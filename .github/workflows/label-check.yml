name: Release Label Check

on:
  pull_request:
    types: [opened, reopened, labeled, unlabeled, synchronize]

permissions: {}

jobs:
  label-check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify exactly one release label
        env:
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail
          VALID=(release/patch release/minor release/major release/skip)
          MATCHED=()
          while IFS= read -r label; do
            for v in "${VALID[@]}"; do
              [ "$label" = "$v" ] && MATCHED+=("$label")
            done
          done < <(printf '%s' "$LABELS_JSON" | jq -r '.[]')

          if [ "${#MATCHED[@]}" -eq 0 ]; then
            echo "::error::PR must have exactly one release label: ${VALID[*]}"
            exit 1
          fi
          if [ "${#MATCHED[@]}" -gt 1 ]; then
            echo "::error::PR has ${#MATCHED[@]} release labels (${MATCHED[*]}); exactly one is required"
            exit 1
          fi
          echo "Label OK: ${MATCHED[0]}"
