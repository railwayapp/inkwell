name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: cp README.md packages/inkwell/README.md
      - run: pnpm --filter @railway/inkwell build
      - run: pnpm --filter @railway/inkwell test
      - run: cd packages/inkwell && npm publish --access public
